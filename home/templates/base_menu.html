{% extends 'base_bootstrap.html' %}
{% load app_tags %} <!-- see home/templatetags/app_tags.py and dj4e-samples/settings.py -->
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3" style="border-radius:10px;">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="{% url 'ads:all' %}">{{ settings.APP_NAME }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% url 'ads:all' as x %}
        <li class="nav-item {% if request.get_full_path == x %}active{% endif %}">
          <a class="nav-link {% if request.get_full_path == x %}active{% endif %}" href="{% url 'ads:all' %}" role="button" aria-current="{% if request.get_full_path == x %}page{% endif %}">Ads</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
        {% if user.is_authenticated %}
          <li class="nav-item me-2">
            <a class="nav-link" href="{% url 'ads:ad_create' %}">Create Ad</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="rightnavDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <img class="nav-avatar me-2" src="{{ user|gravatar:60 }}" alt="avatar"/>
              <span class="visually-hidden">User menu</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="rightnavDropdown">
              <li>
                <form action="{% url 'logout' %}" method="post" class="d-inline m-0 p-0">
                  {% csrf_token %}
                  <input type="hidden" name="next" value="{% url 'ads:all' %}">
                  <button class="dropdown-item btn btn-link w-100 text-start" type="submit">Logout</button>
                </form>
              </li>
            </ul>
          </li>

        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'login' %}?next={% url 'ads:all' %}">Login</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
{% endblock %}
